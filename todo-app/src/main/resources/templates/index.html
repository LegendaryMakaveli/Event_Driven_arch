<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Driven Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }
        
        .footer-text {
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .add-todo-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .add-todo-form input[type="text"] {
            flex: 1;
            padding: 1rem 1.2rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .add-todo-form input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .btn {
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-item {
            padding: 1rem;
            background: #1e293b;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            background: #253147;
            border-color: #475569;
        }

        .todo-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            overflow: hidden;
            flex: 1;
        }

        .todo-title {
            font-size: 1.1rem;
            word-break: break-word;
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        
        .todo-item.completed {
            opacity: 0.7;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-success { color: var(--success-color); }
        .btn-success:hover { background: rgba(16, 185, 129, 0.15); }
        
        .btn-warning { color: var(--warning-color); }
        .btn-warning:hover { background: rgba(245, 158, 11, 0.15); }

        .btn-danger { color: var(--danger-color); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.15); }

        .edit-form {
            display: none;
            gap: 0.5rem;
            margin-top: 0.75rem;
            align-items: center;
        }

        .edit-form.active {
            display: flex;
        }

        .edit-form input[type="text"] {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .edit-form input[type="text"]:focus {
            border-color: var(--warning-color);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .edit-form .btn-save {
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--warning-color);
            color: #0f172a;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-form .btn-save:hover {
            background: #d97706;
            transform: translateY(-1px);
        }

        .edit-form .btn-cancel {
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #475569;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-form .btn-cancel:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            padding: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Event-Driven Tasks</h1>

        <form th:action="@{/add}" method="post" class="add-todo-form">
            <input type="text" name="title" placeholder="What needs to be done?" required />
            <button type="submit" class="btn btn-primary">Add Task</button>
        </form>

        <ul class="todo-list" th:if="${not #lists.isEmpty(todos)}">
            <li th:each="todo : ${todos}" th:class="'todo-item ' + (${todo.completed} ? 'completed' : '')" th:id="'todo-' + ${todo.id}">
                <div class="todo-row">
                    <div class="todo-content">
                        <span class="todo-title" th:text="${todo.title}">Task Name</span>
                    </div>
                    
                    <div class="actions">
                        <!-- Edit button (only for non-completed todos) -->
                        <button th:if="${!todo.completed}" type="button" class="btn-icon btn-warning" title="Edit task"
                                th:onclick="'toggleEdit(' + ${todo.id} + ')'">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>

                        <!-- Complete button -->
                        <form th:if="${!todo.completed}" th:action="@{/complete/{id}(id=${todo.id})}" method="post" style="margin: 0;">
                            <button type="submit" class="btn-icon btn-success" title="Complete task">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </button>
                        </form>
                        
                        <!-- Delete button -->
                        <form th:action="@{/delete/{id}(id=${todo.id})}" method="post" style="margin: 0;">
                            <button type="submit" class="btn-icon btn-danger" title="Delete task">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Inline edit form (hidden by default) -->
                <form th:if="${!todo.completed}" th:action="@{/edit/{id}(id=${todo.id})}" method="post"
                      class="edit-form" th:id="'edit-form-' + ${todo.id}">
                    <input type="text" name="title" th:value="${todo.title}" required />
                    <button type="submit" class="btn-save">Save</button>
                    <button type="button" class="btn-cancel" th:onclick="'toggleEdit(' + ${todo.id} + ')'">Cancel</button>
                </form>
            </li>
        </ul>

        <div class="empty-state" th:if="${#lists.isEmpty(todos)}">
            No tasks yet. Create one to get started!
        </div>
    </div>
    
    <div class="footer-text">
        Check your terminal to see the asynchronous Event Listeners reacting!
    </div>

    <script>
        function toggleEdit(id) {
            const form = document.getElementById('edit-form-' + id);
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                form.querySelector('input[name="title"]').focus();
            }
        }
    </script>

</body>
</html>
